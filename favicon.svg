<svg xmlns="http://w3.org" viewBox="0 0 360 360" width="100%" height="100%">
  <defs>
    <!-- Stiliai šviesiam ir tamsiam rėžimui (Light/Dark Mode via CSS) -->
    <style>
      /* Standartinis nustatymas: TAMSUS RĖŽIMAS (Matrix Reloaded) */
      .bg-rect { fill: url(#bg-dark); }
      .ring { stroke: url(#reloaded-orange); }
      .gap-path { stroke: #050100; }
      .node { fill: #ffffff; }
      .nv-wing { fill: url(#neovim-dark); }
      .nv-edge { fill: #ffffff; }

      /* Automatinis perjungimas: ŠVIESUS RĖŽIMAS (Light / PWA UI) */
      @media (prefers-color-scheme: light) {
        .bg-rect { fill: url(#bg-light); }
        .ring { stroke: url(#reloaded-light); }
        .gap-path { stroke: #fafafa; }
        .node { fill: #110300; }
        .nv-wing { fill: url(#neovim-light); }
        .nv-edge { fill: #110300; }
      }
    </style>

    <!-- TAMSŪS GRADIENTAI -->
    <radialGradient id="bg-dark" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1c0702"/>
      <stop offset="100%" stop-color="#050100"/>
    </radialGradient>
    <linearGradient id="reloaded-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb373"/>
      <stop offset="50%" stop-color="#e95420"/>
      <stop offset="100%" stop-color="#991f00"/>
    </linearGradient>
    <linearGradient id="neovim-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#e95420"/>
    </linearGradient>

    <!-- ŠVIESŪS GRADIENTAI -->
    <radialGradient id="bg-light" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafafa"/>
    </radialGradient>
    <linearGradient id="reloaded-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6624"/>
      <stop offset="100%" stop-color="#b83200"/>
    </linearGradient>
    <linearGradient id="neovim-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e95420"/>
      <stop offset="100%" stop-color="#731c00"/>
    </linearGradient>
  </defs>

  <!-- Piktogramos fonas, keičiantis spalvą -->
  <rect class="bg-rect" width="360" height="360" rx="72"/>

  <!-- CENTRINIS BRANDUOLYS (E-STAR) -->
  <g transform="translate(180, 180)">
    <!-- Pagrindinis storas Ubuntu žiedas -->
    <circle class="ring" cx="0" cy="0" r="115" stroke-width="24" fill="none"/>
    
    <!-- Protonų mazgai -->
    <circle class="node" cx="0" cy="-115" r="22"/>
    <circle class="node" cx="100" cy="58" r="22"/>
    <circle class="node" cx="-100" cy="58" r="22"/>
    
    <!-- Išpjovos (prisitaiko prie fono spalvos) -->
    <path class="gap-path" d="M 0,-85 L 0,-145" stroke-width="16"/>
    <path class="gap-path" d="M 74,43 L 126,73" stroke-width="16"/>
    <path class="gap-path" d="M -74,43 L -126,73" stroke-width="16"/>

    <!-- NeoVim integracija žvaigždės centre -->
    <g transform="scale(0.9) translate(-32, -37)">
      <path class="nv-wing" d="M0,10 L20,0 L20,65 L0,75 Z" opacity="0.95"/>
      <path class="nv-wing" d="M45,0 L65,10 L65,75 L45,65 Z"/>
      <path class="nv-edge" d="M20,0 L45,65 L45,65 L20,15 Z"/>
    </g>
  </g>
</svg>

