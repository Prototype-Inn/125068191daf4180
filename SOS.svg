<svg xmlns="http://w3.org" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Griežtas Canonical tamsusis fonas su sistemos terminalo gyliu -->
    <radialGradient id="terminalBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2C001E" /> <!-- Oficialus Ubuntu baklažanas -->
      <stop offset="70%" stop-color="#11000A" />
      <stop offset="100%" stop-color="#050003" />
    </radialGradient>

    <!-- Kūrėjo mandato neoninis srautas (Binary glitch / merge efektas) -->
    <linearGradient id="binaryLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E95420" /> <!-- Ubuntu Orange -->
      <stop offset="50%" stop-color="#77216F" /> <!-- Ubuntu Muted Purple -->
      <stop offset="100%" stop-color="#00FF66" /> <!-- Terminal Green / Mandatas -->
    </linearGradient>
  </defs>

  <!-- PWA Šoninis rėmas ir fonas (Atitinka Maskable Icon specifikacijas) -->
  <rect width="512" height="512" rx="0" fill="url(#terminalBg)" stroke="#333" stroke-width="2" />

  <!-- DVEJETAINIS KODAS MATRICOJE (Binary Background Disarray) -->
  <g font-family="monospace" font-size="12" fill="#E95420" fill-opacity="0.12">
    <text x="20" y="40">01000011 01000001 01001110 01001111</text>
    <text x="20" y="70">01001110 01010101 01000010 01010101</text>
    <text x="20" y="100">01000110 01001100 01000001 01010110</text>
    <text x="20" y="430">01001101 01000101 01010010 01000111</text>
    <text x="20" y="460">01000101 01010010 01011001 00111001</text>
    <text x="20" y="490">01010011 01010100 01010011 01001100</text>
  </g>

  <!-- SISTEMOS PANELĖS IR TERMINALO RĖMAI (Kūrėjo mandatas / Panel Matrix) -->
  <!-- Viršutinė statuso juosta -->
  <rect x="0" y="0" width="512" height="24" fill="#11000A" fill-opacity="0.8" />
  <circle cx="15" cy="12" r="4" fill="#E95420" />
  <circle cx="30" cy="12" r="4" fill="#77216F" />
  <circle cx="45" cy="12" r="4" fill="#00FF66" />
  <text x="500" y="16" font-family="monospace" font-size="11" fill="#fff" fill-opacity="0.4" text-anchor="end">root@canonical:~#</text>

  <!-- Pagrindinės panelės ašis (X-Y matrica, skirta DE Flavours suvedimui) -->
  <line x1="256" y1="24" x2="256" y2="512" stroke="#3A2335" stroke-dasharray="5 5" stroke-width="1.5" />
  <line x1="0" y1="268" x2="512" y2="268" stroke="#3A2335" stroke-dasharray="5 5" stroke-width="1.5" />

  <!-- DISTRO DISARRAY / SULIEJAMŲ DE FLAVOURS ORBITOS -->
  <!-- Matomas gamybinis suirutes laukas (Disarray Rings) -->
  <circle cx="256" cy="268" r="140" fill="none" stroke="url(#binaryLine)" stroke-width="3" stroke-opacity="0.6" stroke-dasharray="20 10 5 10" />
  <circle cx="256" cy="268" r="90" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2" />

  <!-- MAZGAI (Oficialios Canonical atšakos, jungiamos į Mergerį) -->
  <g id="FlavoursNodes" transform="translate(256, 268)">
    
    <!-- Mazgas 1: KUBUNTU (KDE Plasma melsva įtaka) -->
    <g transform="translate(-120, -70)">
      <circle cx="0" cy="0" r="22" fill="#001F3F" stroke="#0074D9" stroke-width="2" />
      <path d="M -8 -8 L 8 8 M -8 8 L 8 -8" stroke="#ffffff" stroke-width="2" stroke-opacity="0.8" />
      <text x="0" y="32" font-family="monospace" font-size="10" fill="#0074D9" text-anchor="middle" font-weight="bold">K_DE</text>
    </g>

    <!-- Mazgas 2: XUBUNTU / LUBUNTU (Lengvasis sparnas - Disarray būsena) -->
    <g transform="translate(120, -70)">
      <circle cx="0" cy="0" r="22" fill="#0A2510" stroke="#00FF66" stroke-width="2" />
      <rect x="-8" y="-8" width="16" height="16" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.8" />
      <text x="0" y="32" font-family="monospace" font-size="10" fill="#00FF66" text-anchor="middle" font-weight="bold">LX_XF</text>
    </g>

    <!-- Mazgas 3: UBUNTU MATE / CINNAMON (Tradicinės panelės likučiai) -->
    <g transform="translate(-100, 90)">
      <circle cx="0" cy="0" r="18" fill="#221100" stroke="#E95420" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#ffffff" fill-opacity="0.7" />
      <text x="0" y="28" font-family="monospace" font-size="10" fill="#E95420" text-anchor="middle" font-weight="bold">MATE</text>
    </g>

    <!-- CENTRINIS SULIEJIMO REAKTORIUS (The Merger Matrix / Developer Mandate) -->
    <!-- Čia sueina visos panelės ir kodo įsipareigojimai -->
    <g transform="translate(0, 10)">
      <!-- Tikrasis Canonical formos laužymas (Glitch / Hexagon) -->
      <polygon points="0,-45 39,-22 39,22 0,45 -39,22 -39,-22" fill="#11000A" stroke="#ffffff" stroke-width="4" />
      <polygon points="0,-45 39,-22 39,22 0,45 -39,22 -39,-22" fill="none" stroke="#E95420" stroke-width="1.5" stroke-dasharray="6 3" />
      
      <!-- Binary "1" ir "0" susidūrimas centre -->
      <text x="0" y="12" font-family="monospace" font-size="36" font-weight="bold" fill="#00FF66" text-anchor="middle" letter-spacing="-2">1|0</text>
    </g>

    <!-- Jungiamieji vektoriai link centro (Kodo magistralė) -->
    <path d="M -98 -48 L -30 -10" stroke="#E95420" stroke-width="2" stroke-dasharray="4 4" />
    <path d="M 98 -48 L 30 -10" stroke="#00FF66" stroke-width="2" stroke-dasharray="4 4" />
    <path d="M -82 72 L -25 35" stroke="#77216F" stroke-width="1.5" />
  </g>

  <!-- APATINĖ PANELĖ: KŪRĖJO MANDATO INDIKATORIUS -->
  <rect x="0" y="488" width="512" height="24" fill="#E95420" />
  <text x="256" y="505" font-family="monospace" font-size="12" font-weight="bold" fill="#11000A" text-anchor="middle" letter-spacing="2">MANDATE://DISTRO.DISARRAY.OK</text>
</svg>
