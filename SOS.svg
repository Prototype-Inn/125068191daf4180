<svg xmlns="http://w3.org" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Griežtas Canonical serverių gylis: tamsus baklažanas ir anglis -->
    <radialGradient id="matrixBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#2C001E" /> <!-- Ubuntu Core Plum -->
      <stop offset="75%" stop-color="#11000A" />
      <stop offset="100%" stop-color="#040002" />
    </radialGradient>

    <!-- Binary Heaviness / Kūrėjo srauto gradientas -->
    <linearGradient id="heavyBinary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E95420" /> <!-- Ubuntu Orange -->
      <stop offset="50%" stop-color="#77216F" />
      <stop offset="100%" stop-color="#00FF66" /> <!-- Terminal Green -->
    </linearGradient>
  </defs>

  <!-- Pagrindinis išorinis Canonical stiliaus skritulys -->
  <circle cx="256" cy="256" r="250" fill="url(#matrixBg)" stroke="#333" stroke-width="4" />

  <!-- MONITORINGO TINKLELIS (RAM allocation boundaries) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#3A2335" stroke-width="1.5" stroke-dasharray="4 8" />
  <circle cx="256" cy="256" r="110" fill="none" stroke="#3A2335" stroke-width="1.5" />

  <!-- DE FLAVORS MAZGAI PAGAL RAM POOL IR SVORĮ (Be teksto) -->
  <g id="DE_Flavors_Matrix">
    
    <!-- 1. KUBUNTU (Qt/Plasma Pool) -> Didelis RAM svoris -->
    <g transform="translate(256, 96)">
      <!-- Storos linijos indikuoja sunkų RAM pool užpildymą -->
      <circle cx="0" cy="0" r="28" fill="#11000A" stroke="#E95420" stroke-width="6" />
      <path d="M-10,-10 L10,10 M-10,10 L10,-10" stroke="#ffffff" stroke-width="3" />
    </g>

    <!-- 2. LUBUNTU (LXQt) -> Minimalus svoris (Plona linija) -->
    <g transform="translate(96, 256)">
      <!-- Itin plonas kontūras – minimalios RAM sąnaudos (Micro weight) -->
      <circle cx="0" cy="0" r="24" fill="#11000A" stroke="#00FF66" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#00FF66" />
    </g>

    <!-- 3. XUBUNTU (Xfce) -> Lengvas-vidutinis svoris -->
    <g transform="translate(416, 256)">
      <circle cx="0" cy="0" r="24" fill="#11000A" stroke="#00FF66" stroke-width="2.5" />
      <rect x="-6" y="-6" width="12" height="12" fill="none" stroke="#ffffff" stroke-width="2" />
    </g>

    <!-- 4. UBUNTU MATE / CINNAMON -> Subalansuotas vidutinis svoris -->
    <g transform="translate(256, 416)">
      <circle cx="0" cy="0" r="26" fill="#11000A" stroke="#77216F" stroke-width="4" />
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#fff" stroke-width="2.5" />
    </g>

  </g>

  <!-- CENTRINIS SULIEJIMO REAKTORIUS (The Binary Merger / Merging 'em all!) -->
  <g transform="translate(256, 256)">
    <!-- Magistraliniai jungiamieji srautai link centro -->
    <line x1="0" y1="-132" x2="0" y2="-48" stroke="url(#heavyBinary)" stroke-width="5" stroke-dasharray="2 2" />
    <line x1="-136" y1="0" x2="-48" y2="0" stroke="url(#heavyBinary)" stroke-width="3" />
    <line x1="136" y1="0" x2="48" y2="0" stroke="url(#heavyBinary)" stroke-width="3" />
    <line x1="0" y1="134" x2="0" y2="48" stroke="url(#heavyBinary)" stroke-width="4" />

    <!-- Centrinis branduolys su maksimaliu "Binary Heaviness" svoriu (Šešiakampis) -->
    <polygon points="0,-48 42,-24 42,24 0,48 -42,24 -42,-24" fill="#040002" stroke="url(#heavyBinary)" stroke-width="8" />
    
    <!-- Grynasis geometrinis kryžius / sintezės simbolis pačiame centre (be raidžių) -->
    <circle cx="0" cy="0" r="10" fill="#ffffff" />
  </g>
</svg>
