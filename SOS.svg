<svg xmlns="http://w3.org" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Maksimali Lightpack tendencija: itin minkštas, šiltas sensorinis apšvietimas -->
    <radialGradient id="infantryBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#FFFDF7" /> <!-- Pieno švelnumas -->
      <stop offset="55%" stop-color="#FFE6CC" /> <!-- Kreminis persikas -->
      <stop offset="100%" stop-color="#FF9933" /> <!-- Minkšta gynybinė Ubuntu oranžinė -->
    </radialGradient>

    <!-- Kinetinis Lightpack švytėjimas apvaliems pėstininkų mazgams -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- PHP STEM / Asinchroninės darnos centrinis srautas -->
    <linearGradient id="infantryCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5500" />
      <stop offset="100%" stop-color="#00CC44" /> <!-- Tvari pėstininkų žalia -->
    </linearGradient>
  </defs>

  <!-- Apvalus tarptautinio reliatyvizmo skritulys (Pilnai nugludinti kraštai) -->
  <circle cx="256" cy="256" r="248" fill="url(#infantryBg)" stroke="#FF5500" stroke-width="8" />

  <!-- Lightpack sensoriniai pagalbiniai žiedai -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="#FFF" stroke-width="8" stroke-opacity="0.7" filter="url(#softGlow)" />
  <circle cx="256" cy="256" r="125" fill="none" stroke="#00CC44" stroke-width="3" stroke-dasharray="8 12" stroke-opacity="0.3" />

  <!-- DYNAMIC DE RAM POOL: PĖSTININKŲ STRUKTŪRA (Apšlifuoti mazgai) -->
  <g id="Infantry_RAM_Pool">
    
    <!-- 1. KUBUNTU (Maksimalus RAM postas) -> Masyvus, pilnai suapvalintas „pėstininkų vadas“ -->
    <g transform="translate(256, 92)">
      <circle cx="0" cy="0" r="36" fill="#FFF" stroke="#FF5500" stroke-width="9" filter="url(#softGlow)" />
      <!-- Švelnus, apvalus taktilinis įspaudas centre (be aštrių kryžių) -->
      <circle cx="0" cy="0" r="12" fill="none" stroke="#FF9933" stroke-width="5" />
    </g>

    <!-- 2. LUBUNTU (Minimalus RAM postas) -> Lengvas, glotnus pėstininkas-lašelis -->
    <g transform="translate(92, 256)">
      <circle cx="0" cy="0" r="24" fill="#00CC44" stroke="#FFF" stroke-width="2.5" />
      <circle cx="0" cy="0" r="7" fill="#FFF" />
    </g>

    <!-- 3. XUBUNTU (Lengvas-vidutinis RAM) -> Apšlifuotas, supaprastintas sensorinis žiedas -->
    <g transform="translate(420, 256)">
      <!-- Kvadratas visiškai transformuotas į minkštą, taktilinę kapsulę/žiedą -->
      <circle cx="0" cy="0" r="26" fill="#FF5500" stroke="#FFF" stroke-width="4" />
      <circle cx="0" cy="0" r="8" fill="#FFF" />
    </g>

    <!-- 4. UBUNTU MATE (Subalansuotas vidurys) -> Suapvalintas bazinis elementas -->
    <g transform="translate(256, 420)">
      <circle cx="0" cy="0" r="28" fill="#FFF" stroke="#FF5500" stroke-width="6" />
      <circle cx="0" cy="0" r="10" fill="#FF5500" />
    </g>
  </g>

  <!-- CENTRINIS SULIEJIMO REAKTORIUS (Pėstininkų kinetinė stovykla / PHP STEM Šerdis) -->
  <g transform="translate(256, 256)">
    <!-- Užapvalintos, storos kodo magistralės (Binary Heaviness) -->
    <line x1="0" y1="-128" x2="0" y2="-44" stroke="url(#infantryCore)" stroke-width="14" stroke-linecap="round" />
    <line x1="-140" y1="0" x2="-44" y2="0" stroke="url(#infantryCore)" stroke-width="8" stroke-linecap="round" />
    <line x1="140" y1="0" x2="44" y2="0" stroke="url(#infantryCore)" stroke-width="10" stroke-linecap="round" />
    <line x1="0" y1="136" x2="0" y2="44" stroke="url(#infantryCore)" stroke-width="12" stroke-linecap="round" />

    <!-- Centrinis branduolys – visiškai nugludintas, lašo formos megaliubas (Super-soft merge) -->
    <circle cx="0" cy="0" r="44" fill="url(#infantryCore)" stroke="#FFF" stroke-width="6" filter="url(#softGlow)" />
    
    <!-- Infantili, raminanti pėstininkų šypsenėlė įtraukiamajam ugdymui -->
    <circle cx="-11" cy="-7" r="4.5" fill="#FFF" />
    <circle cx="11" cy="-7" r="4.5" fill="#FFF" />
    <path d="M -14,8 Q 0,24 14,8" fill="none" stroke="#FFF" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
