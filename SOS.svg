<svg xmlns="http://w3.org" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Šiltas, jaukus ir įtraukiantis geltonas sensorinis fonas (vengiant violetinės) -->
    <radialGradient id="playBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#FFF9E6" />
      <stop offset="75%" stop-color="#FFE699" />
      <stop offset="100%" stop-color="#FFD666" />
    </radialGradient>

    <!-- Linksmas, žaismingas srauto gradientas centrinėms jungtims -->
    <linearGradient id="happyStream" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E95420" /> <!-- Kanoninė Ubuntu oranžinė -->
      <stop offset="50%" stop-color="#FF851B" /> <!-- Šilta oranžinė -->
      <stop offset="100%" stop-color="#2ECC40" /> <!-- Ryški ugdomoji žalia -->
    </linearGradient>
  </defs>

  <!-- Pagrindinis išorinis minkštas skritulys (kaip ugdomasis kilimėlis) -->
  <circle cx="256" cy="256" r="245" fill="url(#playBg)" stroke="#E95420" stroke-width="12" />

  <!-- Ugdomieji sensoriniai taškeliai fone (paskatinimas tyrinėti) -->
  <circle cx="256" cy="256" r="165" fill="none" stroke="#FF851B" stroke-width="4" stroke-dasharray="8 12" stroke-opacity="0.5" />
  <circle cx="256" cy="256" r="115" fill="none" stroke="#2ECC40" stroke-width="3" stroke-dasharray="6 10" stroke-opacity="0.4" />

  <!-- DRAUGIŠKI DE FLAVORS MAZGAI (Minkštos kaladėlių formos pagal svorį ir RAM Pool) -->
  <g id="Play_Flavors_Matrix">
    
    <!-- 1. KUBUNTU (Masyvus RAM svoris) -> Didelis, minkštas, saugus melsvas rutulys -->
    <g transform="translate(256, 100)">
      <!-- Storos, suapvalintos formos, draugiškos vaikų motorikai -->
      <circle cx="0" cy="0" r="34" fill="#0074D9" stroke="#E95420" stroke-width="8" />
      <!-- Rankutėmis pieštas kryžiukas centre -->
      <path d="M-10,-10 C-5,-5 5,-5 10,-10 M-10,10 C-5,5 5,5 10,10" stroke="#ffffff" stroke-width="5" stroke-linecap="round" fill="none" />
    </g>

    <!-- 2. LUBUNTU (Mažiausias RAM svoris) -> Lengvas, infantilus žalias lašelis/rutuliukas -->
    <g transform="translate(100, 256)">
      <!-- Plona, bet aiški linija – lengva prieinamumui -->
      <circle cx="0" cy="0" r="24" fill="#2ECC40" stroke="#FFF" stroke-width="4" />
      <circle cx="0" cy="0" r="8" fill="#FFF" />
    </g>

    <!-- 3. XUBUNTU (Lengvas-vidutinis svoris) -> Švelnus, suapvalintas kvadratas (taktilinė kaladėlė) -->
    <g transform="translate(412, 256)">
      <rect x="-24" y="-24" width="48" height="48" rx="14" fill="#FF851B" stroke="#FFF" stroke-width="4" />
      <circle cx="0" cy="0" r="7" fill="#FFF" />
    </g>

    <!-- 4. UBUNTU MATE (Subalansuotas vidurys) -> Linksmas geltonas apskritimas su linksmu brūkšneliu -->
    <g transform="translate(256, 412)">
      <circle cx="0" cy="0" r="28" fill="#FFDC00" stroke="#E95420" stroke-width="6" />
      <line x1="-12" y1="0" x2="12" y2="0" stroke="#E95420" stroke-width="6" stroke-linecap="round" />
    </g>

  </g>

  <!-- ŽAISMINGAS SULIEJIMO CENTRAS (The Mega-Merge Puzzle Piece) -->
  <g transform="translate(256, 256)">
    <!-- Minkštos, storos, suapvalintos jungtys link centro (kaip medinio traukinuko bėgiai) -->
    <line x1="0" y1="-122" x2="0" y2="-46" stroke="url(#happyStream)" stroke-width="12" stroke-linecap="round" />
    <line x1="-132" y1="0" x2="-46" y2="0" stroke="url(#happyStream)" stroke-width="10" stroke-linecap="round" />
    <line x1="132" y1="0" x2="46" y2="0" stroke="url(#happyStream)" stroke-width="10" stroke-linecap="round" />
    <line x1="0" y1="124" x2="0" y2="46" stroke="url(#happyStream)" stroke-width="10" stroke-linecap="round" />

    <!-- Centrinė dėlionės dalis (Minkštas šešiakampis suapvalintais kampais – Binary Heaviness) -->
    <path d="M 0,-44 Q 38,-22 38,22 Q 0,44 -38,22 Q -38,-22 0,-44 Z" fill="#E95420" stroke="#FFF" stroke-width="6" />
    
    <!-- Šypsenėlė pačiame centre (Sintezės ir bendrystės džiaugsmas!) -->
    <circle cx="-10" cy="-6" r="4" fill="#FFF" />
    <circle cx="10" cy="-6" r="4" fill="#FFF" />
    <path d="M -12,8 Q 0,20 12,8" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
