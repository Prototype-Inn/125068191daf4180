<svg xmlns="http://w3.org" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Griežtas, bet kontrastingas PEGI 13 Lightpack fonas (vengiant slegiančios violetinės) -->
    <radialGradient id="pegiBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="60%" stop-color="#FFDCA8" />
      <stop offset="100%" stop-color="#E95420" /> <!-- Grynasis Ubuntu korporatyvinis akcentas -->
    </radialGradient>

    <!-- Gautas techninis švytėjimas – reprezentuoja Umidigi BT disarray srautą -->
    <filter id="btDisarrayGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- PHP STEM gamybinis vektoriaus gradientas -->
    <linearGradient id="phpStemCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E95420" />
      <stop offset="100%" stop-color="#00FF66" /> <!-- Gamybinė terminalo žalia -->
    </linearGradient>
  </defs>

  <!-- Pagrindinis išorinis Canonical stiliaus skritulys -->
  <circle cx="256" cy="256" r="248" fill="url(#pegiBg)" stroke="#E95420" stroke-width="8" />

  <!-- Didinamas socialinis atstumas: izoliaciniai matricos žiedai -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#FFF" stroke-width="4" stroke-opacity="0.5" filter="url(#btDisarrayGlow)" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#E95420" stroke-width="1.5" stroke-dasharray="12 16" stroke-opacity="0.3" />

  <!-- UBUNTU FLAVORS KANONAI: RAM SVORIO ASIMETRIJA (Didesnis atstumas tarp mazgų) -->
  <g id="Social_Distance_Flavors">
    
    <!-- 1. KUBUNTU (Maksimalus RAM - 8px) -> Nustumtas tolyn į šiaurę -->
    <g transform="translate(256, 76)">
      <circle cx="0" cy="0" r="32" fill="#FFF" stroke="#E95420" stroke-width="8" filter="url(#btDisarrayGlow)" />
      <circle cx="0" cy="0" r="10" fill="none" stroke="#E95420" stroke-width="4" />
    </g>

    <!-- 2. LUBUNTU (Minimalus RAM - 2px) -> Nustumtas giliai į vakarus (uPods Streetz BT linija) -->
    <g transform="translate(76, 256)">
      <circle cx="0" cy="0" r="24" fill="#00FF66" stroke="#FFF" stroke-width="2" />
      <rect x="-5" y="-5" width="10" height="10" fill="#FFF" />
    </g>

    <!-- 3. XUBUNTU (Lengvas-vidutinis - 3.5px) -> Tolimas rytų mazgas (uWatch ašis) -->
    <g transform="translate(436, 256)">
      <circle cx="0" cy="0" r="26" fill="#E95420" stroke="#FFF" stroke-width="3.5" />
      <circle cx="0" cy="0" r="6" fill="#FFF" />
    </g>

    <!-- 4. UBUNTU MATE (Vidutinis - 5px) -> Maksimaliai nutolusi pietų bazė -->
    <g transform="translate(256, 436)">
      <circle cx="0" cy="0" r="28" fill="#FFF" stroke="#E95420" stroke-width="5" />
      <line x1="-12" y1="0" x2="12" y2="0" stroke="#E95420" stroke-width="5" stroke-linecap="round" />
    </g>
  </g>

  <!-- U-TURN MERGER BRANDUOLYS: PHP STEM ASINCHRONINĖ AŠIS (uBotu / uWatch) -->
  <g transform="translate(256, 256)">
    <!-- „U-Turn“ formos asimetrinės magistralės, jungiančios išsiderinusį aparatūros srautą -->
    <!-- Šiaurinis U-Turn srautas -->
    <path d="M -16,-148 L -16,-46 C -16,-30 16,-30 16,-46 L 16,-148" fill="none" stroke="url(#phpStemCore)" stroke-width="12" stroke-linecap="round" />
    
    <!-- Horizontalių srautų disarray (uPods streetz išsklaidymas) -->
    <line x1="-148" y1="0" x2="-46" y2="0" stroke="url(#phpStemCore)" stroke-width="6" stroke-linecap="round" />
    <line x1="148" y1="0" x2="46" y2="0" stroke="url(#phpStemCore)" stroke-width="8" stroke-linecap="round" />
    <line x1="0" y1="148" x2="0" y2="46" stroke="url(#phpStemCore)" stroke-width="10" stroke-linecap="round" />

    <!-- Centrinis techninis mazgas – Švari Canonical geometrijos laužymo kapsulė -->
    <circle cx="0" cy="0" r="46" fill="#FFF" stroke="url(#phpStemCore)" stroke-width="6" filter="url(#btDisarrayGlow)" />
    
    <!-- KANONINIS UBUNTU FLAVORS TRIKAMPIS (Pakeičia emoji -> PEGI13 šou branduolys) -->
    <!-- Griežtas, žaismingas, kampuotas sintezės elementas -->
    <polygon points="0,-24 24,18 -24,18" fill="url(#phpStemCore)" />
    
    <!-- Vidinis stabilizuojantis binary taškas trikampio centre -->
    <circle cx="0" cy="4" r="5" fill="#FFF" />
  </g>
</svg>
