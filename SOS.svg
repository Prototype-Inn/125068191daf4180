<svg xmlns="http://w3.org" viewBox="0 0 256 256" width="100%" height="auto">
  <defs>
    <!-- Griežtas COSMIC / Rust tamsusis fonas su neoniniu Pop!_OS Teal švytėjimu -->
    <linearGradient id="nexusGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#7000FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E95420" stop-opacity="0.8"/>
    </linearGradient>
    <style>
      .nexus-bg { fill: #111116; stroke: #222230; stroke-width: 3; }
      .outer-nexus { fill: none; stroke: url(#nexusGlow); stroke-width: 5; stroke-linecap: round; }
      .stylus-unit { fill: none; stroke: #FFFFFF; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .screen-grid { fill: none; stroke: #313143; stroke-width: 1; stroke-dasharray: 4 4; opacity: 0.5; }
      .core-node { stroke-width: 2; }
      .txt-title { fill: #FFFFFF; font-family: sans-serif; font-size: 11px; font-weight: bold; letter-spacing: 1.5px; }
      .txt-code { fill: #A5ADCB; font-family: 'Courier New', monospace; font-size: 9px; font-weight: bold; }
    </style>
  </defs>

  <!-- 1. Pagrindinis įrenginio korpusas (Matinis anglies kvadratas) -->
  <rect width="248" height="248" x="4" y="4" rx="36" class="nexus-bg"/>
  
  <!-- 2. Mobiliojo ekrano tinklelis (Nexus Mobile UX) -->
  <path d="M40 40 H216 V216 H40 Z" class="screen-grid"/>
  <line x1="128" y1="40" x2="128" y2="216" class="screen-grid"/>
  <line x1="40" y1="128" x2="216" y2="128" class="screen-grid"/>

  <!-- 3. Nexus Išorinis Karkasas (5 konvergencijos taškai aplink perimetrą) -->
  <path d="M50 70 L128 35 L206 70 V160 L128 220 L50 160 Z" class="outer-nexus"/>

  <!-- 4. Integruotas Stylus įvesties elementas (Kertantis vektorius per visą karkasą) -->
  <path d="M70 190 L170 90 M170 90 L160 80 M170 90 L180 100" class="stylus-unit"/>
  <circle cx="65" cy="195" r="4" fill="#00F0FF" /> <!-- Stylus aktyvavimo taškas -->

  <!-- 5. 5 Konvergencijos mazgai (C-Suite + Ubuntu + Idol Hibridai) -->
  <!-- Mazgas 1: Povilas & Cho (Kylin Oranžinė) -->
  <circle cx="128" cy="35" r="7" fill="#E95420" class="core-node" stroke="#FFFFFF"/>
  <!-- Mazgas 2: daemon & Camila (Lubuntu Mėlyna) -->
  <circle cx="206" cy="70" r="7" fill="#36A2EB" class="core-node" stroke="#FFFFFF"/>
  <!-- Mazgas 3: Vytis & Leecho (Xubuntu Gelsva) -->
  <circle cx="206" cy="160" r="7" fill="#FFB900" class="core-node" stroke="#FFFFFF"/>
  <!-- Mazgas 4: adm & Lauren (Kubuntu Žalia) -->
  <circle cx="128" cy="220" r="7" fill="#87A96B" class="core-node" stroke="#FFFFFF"/>
  <!-- Mazgas 5: Gintaras & Liz (Budgie Šviesiai Mėlyna) -->
  <circle cx="50" cy="115" r="7" fill="#00F0FF" class="core-node" stroke="#FFFFFF"/>

  <!-- 6. Įrenginio identifikavimo tekstas (ICO Metrika) -->
  <text x="128" y="238" text-anchor="middle" class="txt-title">NEXUS MOBILE UNIT</text>
  <text x="128" y="20" text-anchor="middle" class="txt-code">STYLUS // ICO_v5.0_GOT!!!</text>
</svg>

