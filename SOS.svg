<svg xmlns="http://w3.org" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Modernus gradientas iš Ubuntu oranžinės į tamsią / gilų baklažaną -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E95420" />
      <stop offset="60%" stop-color="#AE3A11" />
      <stop offset="100%" stop-color="#2C001E" />
    </linearGradient>
    
    <!-- Švytėjimas susiliejimo (merger) taškui -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- PWA Saugios zonos fonas (Maskable reikalavimas) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Panoramos (panos) / horizonto linijų sintezė fone -->
  <path d="M 64 340 C 160 280, 220 380, 320 310 C 380 270, 420 330, 448 300 L 448 448 L 64 448 Z" fill="#ffffff" fill-opacity="0.08" />
  <path d="M 64 380 C 140 340, 260 410, 360 360 C 400 340, 430 370, 448 360 L 448 448 L 64 448 Z" fill="#ffffff" fill-opacity="0.05" />

  <!-- Kūrėjo (Developer) kodo elementas: gilesnis / apjungiantis apskritimas -->
  <circle cx="256" cy="240" r="110" fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.15" stroke-dasharray="15 10" />

  <!-- Ikonų Merger branduolys (Įkvėptas Ubuntu "Circle of Friends" ir Panoramos karkaso) -->
  <g transform="translate(256, 240)">
    
    <!-- Jungiamosios rankovės / orbitos (Merger srautai) -->
    <path d="M -70 -40 C -40 -70, 40 -70, 70 -40" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" />
    <path d="M -80 20 C -50 80, 50 80, 80 20" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" />
    <path d="M 0 -80 L 0 60" fill="none" stroke="#ffffff" stroke-width="10" stroke-dasharray="8 8" stroke-opacity="0.5" />

    <!-- Įsiliejančios piktogramos (Mazgai / Taškai) -->
    <!-- Kairysis mazgas (Pradinis failas A) -->
    <circle cx="-75" cy="-25" r="28" fill="#FDF6F0" filter="url(#glow)" />
    <circle cx="-75" cy="-25" r="14" fill="#E95420" />

    <!-- Dešinysis mazgas (Pradinis failas B) -->
    <circle cx="75" cy="-25" r="28" fill="#FDF6F0" filter="url(#glow)" />
    <circle cx="75" cy="-25" r="14" fill="#E95420" />

    <!-- Centrinis / Panoraminis susiliejimo taškas (Merger rezultatas) -->
    <circle cx="0" cy="50" r="38" fill="#ffffff" filter="url(#glow)" />
    <!-- Vidinis programuotojų trikampis (Play / Švari sintezė) -->
    <polygon points="-10,38 15,50 -10,62" fill="#2C001E" />

  </g>

  <!-- Užrašas PWA apačioje (Kūrėjų terminalo šriftas) -->
  <text x="256" y="440" font-family="monospace, Courier" font-size="26" font-weight="bold" fill="#FDF6F0" fill-opacity="0.7" text-anchor="middle" letter-spacing="4">ICON.MERGER</text>
</svg>
